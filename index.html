<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FIFA WC 2026 · Fantamondiale Leaderboard</title>
<meta name="description" content="Live Fantamondiale leaderboard — FIFA World Cup 2026"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rubik:wght@400;600;800;900&display=swap');
  :root{
    --field:#e7f5dd; --field2:#d7ecc4; --ink:#0f2a1a; --card:#ffffff; --card2:#fff8dc;
    --gold:#ffcc00; --goldDark:#9c7a00; --silver:#c8d2cc; --silverDark:#5b6b63;
    --bronze:#cd7f32; --bronzeDark:#7a4a18;
    --green:#1f9d4d; --green2:#127a38;
    --txt:#0f2a1a; --dim:#516a5a; --line:#0f2a1a;
    --accent:#1f9d4d; --accent2:#ffcc00;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Rubik',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:repeating-linear-gradient(90deg,var(--field) 0 64px,var(--field2) 64px 128px);
    color:var(--txt);min-height:100vh;padding:32px 16px 80px;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto}
  header{text-align:center;margin-bottom:36px}
  .kicker{font-weight:800;letter-spacing:.32em;font-size:12px;color:var(--green2);text-transform:uppercase;margin-bottom:14px}
  h1{font-family:'Press Start 2P',monospace;font-size:clamp(18px,5.2vw,40px);line-height:1.4;
    color:var(--gold);text-shadow:3px 3px 0 var(--ink);letter-spacing:1px}
  .sub{color:var(--dim);margin-top:16px;font-size:15px;font-weight:600}
  .stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}
  .pill{background:#fff;border:3px solid var(--line);border-radius:10px;padding:9px 18px;font-size:13px;color:var(--dim);font-weight:700;box-shadow:3px 3px 0 var(--line)}
  .pill b{color:var(--green2)}
  .podium{display:flex;gap:18px;justify-content:center;align-items:flex-end;margin:40px 0 30px;flex-wrap:wrap}
  .pod{flex:1;min-width:180px;max-width:280px;border-radius:14px;padding:26px 20px;text-align:center;
    border:3px solid var(--line);background:#fff;box-shadow:5px 5px 0 var(--line);
    transform:translateY(24px);opacity:0;animation:rise .7s forwards}
  .pod .medal{font-size:40px;margin-bottom:6px}
  .pod .pname{font-weight:800;font-size:18px;margin:6px 0;color:var(--ink)}
  .pod .ppts{font-family:'Press Start 2P',monospace;font-size:26px;letter-spacing:-1px}
  .pod .plabel{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
  .pod.gold{background:linear-gradient(180deg,#fff6c7,#fff);border-color:var(--goldDark);box-shadow:5px 5px 0 var(--goldDark);padding-top:34px;order:2}
  .pod.silver{background:linear-gradient(180deg,#eef2ef,#fff);border-color:var(--silverDark);box-shadow:5px 5px 0 var(--silverDark);order:1}
  .pod.bronze{background:linear-gradient(180deg,#ffe3c2,#fff);border-color:var(--bronzeDark);box-shadow:5px 5px 0 var(--bronzeDark);order:3}
  .pod.gold .ppts{color:var(--goldDark)} .pod.silver .ppts{color:var(--silverDark)} .pod.bronze .ppts{color:var(--bronzeDark)}
  @keyframes rise{to{transform:translateY(0);opacity:1}}
  .board{display:flex;flex-direction:column;gap:12px;margin-top:10px}
  .row{background:#fff;border:3px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:4px 4px 0 var(--line);
    opacity:0;transform:translateY(10px);animation:fade .5s forwards}
  @keyframes fade{to{opacity:1;transform:none}}
  .rmain{display:grid;grid-template-columns:56px 1fr auto 40px;align-items:center;gap:14px;padding:16px 18px;cursor:pointer;transition:background .15s}
  .rmain:hover{background:#fbf8e8}
  .rank{font-family:'Press Start 2P',monospace;font-size:18px;color:var(--dim);text-align:center}
  .top1 .rank{color:var(--goldDark)} .top2 .rank{color:var(--silverDark)} .top3 .rank{color:var(--bronzeDark)}
  .who{font-weight:800;font-size:17px;color:var(--ink)}
  .barwrap{height:10px;background:#eef3ec;border:2px solid var(--line);border-radius:5px;margin-top:8px;overflow:hidden;width:min(480px,46vw)}
  .bar{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));width:0;transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
  .top1 .bar{background:linear-gradient(90deg,var(--gold),#ffe27a)}
  .pts{font-family:'Press Start 2P',monospace;font-size:18px;text-align:right;color:var(--green2)}
  .chev{color:var(--dim);transition:transform .25s;text-align:center;font-weight:900}
  .row.open .chev{transform:rotate(180deg)}
  .detail{max-height:0;overflow:hidden;transition:max-height .35s ease;border-top:0 solid transparent}
  .row.open .detail{max-height:420px;border-top:3px solid var(--line)}
  .cats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:18px;background:#fbf8e8}
  @media (min-width:700px){
    .cats{grid-template-columns:repeat(6,1fr)}
  }
  .cat{background:#fff;border:2px solid var(--line);border-radius:8px;padding:12px}
  .cat .cl{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .cat .cv{font-family:'Press Start 2P',monospace;font-size:17px;margin-top:6px;color:var(--green2)}
  .cat.zero{opacity:.45}
  .ctx{padding:0 18px 18px;font-size:12.5px;color:var(--dim);background:#fbf8e8;font-weight:600}
  .search{display:block;margin:28px auto 6px;width:min(420px,90%);background:#fff;border:3px solid var(--line);
    color:var(--ink);border-radius:10px;padding:12px 18px;font-size:15px;outline:none;font-weight:600;box-shadow:3px 3px 0 var(--line)}
  .search:focus{border-color:var(--green)}
  footer{text-align:center;color:var(--dim);font-size:12.5px;margin-top:44px;line-height:1.7;font-weight:600}
  .state{text-align:center;color:var(--dim);padding:60px 20px;font-size:16px;font-weight:600}
  @media (max-width:699px){
    .podium{flex-direction:column;align-items:stretch}
    .pod{max-width:100%;padding-top:26px}
    .pod.gold,.pod.silver,.pod.bronze{order:0}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Fantamondiale · World Cup 2026</div>
    <h1>The Leaderboard</h1>
    <div class="sub" id="sub">Loading live scores…</div>
    <div class="stats" id="stats"></div>
  </header>
  <div class="podium" id="podium"></div>
  <input class="search" id="search" placeholder="Search a participant…" style="display:none"/>
  <div class="board" id="board"><div class="state">Connecting to live data…</div></div>
  <footer id="foot"></footer>
</div>

<script>
const SUPABASE_URL = "https://ecqieaselexhcqkwbtcy.supabase.co";
const SUPABASE_KEY = "sb_publishable_EjucVbOgT36P_4e7D0eBYg_GwxS0Mgf";
const CATS = [
  ["correct_score","Correct Score"],["correct_outcome","Correct Outcome"],
  ["group_positions","Group Positions"],["knockouts","Knockouts"],
  ["final_standings","Final Standings"],["top_scorer","Top Scorer"]
];
const headers = { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY };

async function load(){
  try{
    const [rowsR, metaR] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/xl_leaderboard?select=*&order=rank.asc,name.asc`, {headers}),
      fetch(`${SUPABASE_URL}/rest/v1/xl_leaderboard_meta?id=eq.1&select=*`, {headers})
    ]);
    if(!rowsR.ok) throw new Error("HTTP "+rowsR.status);
    const rows = await rowsR.json();
    const meta = (await metaR.json())[0] || {};
    render(rows, meta);
  }catch(e){
    document.getElementById('board').innerHTML =
      `<div class="state">Couldn't load live data (${e.message}).<br>Please refresh in a moment.</div>`;
    document.getElementById('sub').textContent = "";
  }
}

function render(rows, meta){
  const maxBar = Math.max(1, meta.max_possible || 1);
  const tmax = meta.tournament_max || 0;
  document.getElementById('sub').textContent =
    `${meta.participants||rows.length} participants · ${meta.matches_played||0} group matches scored · ${meta.groups_complete||0} groups finalised`;
  document.getElementById('stats').innerHTML =
    `<span class="pill">Updated <b>${meta.generated||'—'}</b></span>`
    + `<span class="pill">Leader <b>${rows[0]?rows[0].total:0}</b> / ${meta.max_possible||0} so far</span>`
    + `<span class="pill">Tournament max <b>${tmax}</b> pts</span>`;
  document.getElementById('foot').innerHTML =
    `Live from Supabase · group scoring active · knockouts & standings activate as results are entered`;

  const podEl = document.getElementById('podium');
  const medal=['🥇','🥈','🥉'], cls=['gold','silver','bronze'];
  podEl.innerHTML='';
  rows.slice(0,3).forEach((d,i)=>{
    const el=document.createElement('div'); el.className='pod '+cls[i];
    el.innerHTML=`<div class="medal">${medal[i]}</div><div class="plabel">#${d.rank}</div>
      <div class="pname">${d.name}</div><div class="ppts">${d.total}</div><div class="plabel">points</div>`;
    podEl.appendChild(el);
  });

  const search=document.getElementById('search'); search.style.display='block';
  const board=document.getElementById('board');
  function build(list){
    board.innerHTML='';
    list.forEach((d,idx)=>{
      const top = d.rank<=3 ? ('top'+d.rank):'';
      const row=document.createElement('div'); row.className='row '+top; row.style.animationDelay=(idx*0.03)+'s';
      const cats=CATS.map(([k,label])=>{
        const v=d[k]||0;
        return `<div class="cat ${v===0?'zero':''}"><div class="cl">${label}</div><div class="cv">${v}</div></div>`;
      }).join('');
      const pctT = tmax? (100*d.total/tmax).toFixed(1):'0';
      const pctN = Math.round(100*d.total/maxBar);
      row.innerHTML=`
        <div class="rmain">
          <div class="rank">${d.rank}</div>
          <div><div class="who">${d.name}</div>
            <div class="barwrap"><div class="bar" data-w="${pctN}"></div></div></div>
          <div class="pts">${d.total}</div>
          <div class="chev">▾</div>
        </div>
        <div class="detail"><div class="cats">${cats}</div>
          <div class="ctx">${d.total} of ${tmax} tournament points (${pctT}%) · ${d.total} of ${meta.max_possible||0} available so far (${pctN}%)</div>
        </div>`;
      row.querySelector('.rmain').onclick=()=>row.classList.toggle('open');
      board.appendChild(row);
    });
    requestAnimationFrame(()=>document.querySelectorAll('.bar').forEach(b=>b.style.width=b.dataset.w+'%'));
  }
  build(rows);
  search.oninput=e=>{
    const q=e.target.value.toLowerCase();
    build(rows.filter(d=>(d.name||'').toLowerCase().includes(q)));
  };
}
load();
</script>
</body>
</html>
