<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FIFA WC 2026 · Fantamondiale Leaderboard</title>
  <meta name="description" content="Live Fantamondiale leaderboard — FIFA World Cup 2026" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

    :root {
      --neon-green: #39FF14;
      --neon-pink: #FF10F0;
      --neon-cyan: #00FFFF;
      --neon-yellow: #FFE800;
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
      --ink: #050014;
    }

    html {
      background: #000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      border-radius: 0 !important
    }

    body {
      font-family: 'VT323', monospace;
      font-size: 18px;
      background: linear-gradient(to bottom, #1a0033 0%, #0a0020 50%, #000 100%);
      color: var(--neon-green);
      min-height: 100vh;
      padding: 18px 14px 60px;
      position: relative;
      overflow-x: hidden;
    }

    @keyframes flicker {

      0%,
      100% {
        opacity: 1
      }

      92% {
        opacity: 1
      }

      93% {
        opacity: .82
      }

      94% {
        opacity: 1
      }

      97% {
        opacity: 1
      }

      98% {
        opacity: .88
      }
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      position: relative
    }

    /* HUD bar */
    .hud {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      margin-bottom: 22px;
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 0 3px var(--ink), 0 0 0 5px var(--neon-pink), 0 0 16px rgba(0, 255, 255, .4);
      padding: 10px 16px;
      background: rgba(5, 0, 20, 0.6)
    }

    .hud-item {
      color: var(--neon-yellow);
      text-shadow: 0 0 6px var(--neon-yellow)
    }

    .hud-item.blink {
      animation: blink 2s steps(2) infinite
    }

    @keyframes blink {
      50% {
        opacity: .25
      }
    }

    header {
      text-align: center;
      margin-bottom: 8px
    }

    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(18px, 5.5vw, 50px);
      line-height: 1.2;
      color: var(--neon-yellow);
      letter-spacing: 3px;
      font-weight: 900;
      text-shadow: 3px 3px 0 var(--neon-pink), 6px 6px 0 var(--neon-cyan), 0 0 24px rgba(255, 232, 0, .5);
      animation: glitchIn .6s ease-out
    }

    @keyframes glitchIn {
      0% {
        opacity: 0;
        transform: translate(-12px, 0) skewX(8deg);
        filter: hue-rotate(120deg)
      }

      25% {
        opacity: 1;
        transform: translate(8px, 0) skewX(-6deg)
      }

      50% {
        transform: translate(-4px, 0) skewX(3deg);
        filter: hue-rotate(40deg)
      }

      75% {
        transform: translate(2px, 0) skewX(-1deg);
        filter: hue-rotate(0deg)
      }

      100% {
        transform: translate(0, 0) skewX(0);
        opacity: 1
      }
    }

    .ticker {
      margin: 14px 0 0;
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      border-top: 2px solid var(--neon-pink);
      border-bottom: 2px solid var(--neon-pink);
      padding: 6px 0
    }

    .ticker span {
      display: inline-block;
      padding-left: 100%;
      font-size: 15px;
      color: var(--neon-cyan);
      text-shadow: 0 0 6px var(--neon-cyan);
      animation: marquee 16s linear infinite
    }

    @keyframes marquee {
      to {
        transform: translateX(-100%)
      }
    }

    .sub {
      display: none
    }

    .stats {
      display: none
    }

    .section-label {
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: var(--neon-pink);
      text-shadow: 0 0 8px var(--neon-pink);
      margin: 30px 0 16px;
      letter-spacing: 2px
    }

    .podium {
      display: flex;
      gap: 18px;
      justify-content: center;
      align-items: flex-end;
      margin: 0 0 30px;
      flex-wrap: wrap
    }

    .pod {
      flex: 1;
      min-width: 170px;
      max-width: 220px;
      padding: 20px 14px;
      text-align: center;
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 0 3px var(--ink), 0 0 0 5px var(--neon-pink), 0 0 18px rgba(0, 255, 255, .45);
      transform: translateY(20px);
      opacity: 0;
      animation: rise .6s forwards
    }

    .pod .medal {
      font-size: 38px;
      margin-bottom: 6px
    }

    .pod .pname {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(12px, 3.2vw, 16px);
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 6px 0;
      line-height: 1.3;
    }

    .pod .ppts {
      font-family: 'Press Start 2P', monospace;
      font-size: 26px;
      letter-spacing: 1px;
      font-weight: 900;
      margin: 8px 0;
      color: var(--neon-green)
    }

    .pod .plabel {
      display: none
    }

    .pod-rank {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      margin-top: 4px;
      letter-spacing: 1px
    }

    @keyframes rise {
      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    @keyframes flash {

      0%,
      100% {
        opacity: 1;
        filter: brightness(1)
      }

      50% {
        opacity: .5;
        filter: brightness(1.8)
      }
    }

    .r1 {
      color: var(--gold);
      text-shadow: 0 0 10px var(--gold);
      animation: flash 0.8s infinite
    }

    .r2 {
      color: var(--silver);
      text-shadow: 0 0 10px var(--silver);
      animation: flash 1.0s infinite
    }

    .r3 {
      color: var(--bronze);
      text-shadow: 0 0 10px var(--bronze);
      animation: flash 1.2s infinite
    }

    .board {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px
    }

    .row {
      background: rgba(5, 0, 20, 0.6);
      overflow: hidden;
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 0 3px var(--ink), 0 0 0 5px var(--neon-pink), 0 0 14px rgba(0, 255, 255, .3);
      opacity: 0;
      transform: translateY(8px);
      animation: fade .5s forwards;
      transition: box-shadow .2s, background .2s
    }

    .row:hover {
      background: rgba(20, 0, 40, 0.85);
      box-shadow: 0 0 0 3px var(--ink), 0 0 0 5px var(--neon-green), 0 0 22px rgba(57, 255, 20, .55)
    }

    @keyframes fade {
      to {
        opacity: 1;
        transform: none
      }
    }

    .rmain {
      display: grid;
      grid-template-columns: 40px 1fr auto 28px;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      cursor: pointer;
      transition: transform .1s;
      white-space: nowrap;
      position: relative
    }

    .rmain:active {
      transform: translateY(2px)
    }

    .ball {
      font-size: 14px;
      text-align: center;
      opacity: 0;
      transition: opacity .2s;
      display: none
    }

    .row:hover .ball {
      opacity: 1;
      animation: bob .5s ease-in-out infinite alternate
    }

    @keyframes bob {
      from {
        transform: translateY(0) rotate(0deg)
      }

      to {
        transform: translateY(-3px) rotate(20deg)
      }
    }

    .who {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 2.5vw, 10px);
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap
    }

    .barwrap {
      height: 12px;
      background: #000;
      border: 1px solid var(--neon-cyan);
      margin-top: 7px;
      overflow: hidden;
      width: clamp(80px, 40vw, 500px)
    }

    .bar {
      height: 100%;
      width: 0;
      transition: width 1.2s cubic-bezier(.2, .8, .2, 1);
      box-shadow: 0 0 10px currentColor
    }

    .pts {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(12px, 3vw, 14px);
      font-weight: 900;
      text-align: right;
      color: var(--neon-yellow)
    }

    .chev {
      color: var(--neon-pink);
      transition: transform .25s;
      text-align: center;
      font-weight: 900;
      font-size: 12px;
      text-shadow: 0 0 6px var(--neon-pink)
    }

    .row.open .chev {
      transform: rotate(180deg)
    }

    .detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height .35s ease
    }

    .row.open .detail {
      max-height: 420px;
      border-top: 2px solid var(--neon-cyan)
    }

    .cats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 16px 16px 4px;
      background: rgba(0, 0, 0, 0.4)
    }

    @media (min-width:700px) {
      .cats {
        grid-template-columns: repeat(6, 1fr)
      }
    }

    .cat {
      background: rgba(5, 0, 20, 0.7);
      border: 1px solid var(--neon-cyan);
      box-shadow: 0 0 0 2px var(--ink), 0 0 0 3px var(--neon-pink);
      padding: 10px;
      text-align: center
    }

    .cat .cl {
      font-size: 18px;
      color: #fff;
      font-weight: 400;
      text-transform: uppercase;
      line-height: 1.2
    }

    .cat .cv {
      font-size: 26px;
      margin-top: 6px;
      color: var(--neon-green);
      font-weight: 700;
      text-shadow: none
    }

    .cat.zero {
      opacity: .35
    }

    .ctx {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 16px 14px;
      font-size: 14px;
      color: var(--neon-cyan);
      background: rgba(0, 0, 0, 0.4)
    }

    .ctx-winner {
      text-align: right
    }

    .search {
      display: block;
      margin: 26px auto 4px;
      width: 100%;
      background: rgba(5, 0, 20, 0.7);
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 0 3px var(--ink), 0 0 0 5px var(--neon-pink), 0 0 16px rgba(0, 255, 255, .4);
      color: var(--neon-green);
      padding: 12px 16px;
      font-family: 'VT323', monospace;
      font-size: 18px;
      outline: none
    }

    .search:focus {
      box-shadow: 0 0 0 3px var(--ink), 0 0 0 5px var(--neon-green), 0 0 22px rgba(57, 255, 20, .55)
    }

    .search::placeholder {
      color: rgba(57, 255, 20, .5)
    }

    footer {
      text-align: center;
      color: var(--neon-cyan);
      font-size: 18px;
      margin-top: 36px;
      line-height: 1.6;
      text-shadow: 0 0 6px var(--neon-cyan)
    }

    .state {
      text-align: center;
      color: var(--neon-green);
      padding: 40px 20px;
      font-size: 18px;
      animation: blink 1s steps(2) infinite
    }

    @media (min-width:700px) {
      .podium {
        flex-wrap: nowrap
      }

      .pod {
        min-width: auto;
        max-width: none
      }

      .rmain {
        grid-template-columns: 22px 36px 1fr 80px 32px
      }

      .ball {
        display: block
      }

      .who {
        white-space: normal
      }

      .barwrap {
        width: clamp(250px, 50vw, 600px)
      }
    }

    @media (max-width:699px) {
      .podium {
        flex-direction: column;
        align-items: stretch;
        gap: 14px
      }

      .pod {
        max-width: 100%
      }

      .rmain {
        grid-template-columns: 26px 165px 1fr auto;
        gap: 6px;
        padding: 10px 8px
      }

      .who {
        max-width: 225px
      }

      .barwrap {
        width: 225px;
        height: 9px;
        margin-top: 4px
      }

      .pts {
        min-width: 32px
      }

      .chev {
        margin-left: -1px
      }
    }

    /* Tabs */
    .tabs {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 20px auto;
      max-width: 500px;
      width: 100%;
    }

    @media (min-width: 700px) {
      .tabs {
        flex-direction: row;
        justify-content: center;
        gap: 20px;
        max-width: none;
      }
    }

    .tab-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      background: rgba(5, 0, 20, 0.7);
      color: var(--neon-cyan);
      border: 2px solid var(--neon-cyan);
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-shadow: 0 0 5px var(--neon-cyan);
      box-shadow: 0 0 0 2px var(--ink), 0 0 0 4px var(--neon-pink);
      outline: none;
    }

    .tab-btn:hover {
      color: var(--neon-green);
      border-color: var(--neon-green);
      text-shadow: 0 0 5px var(--neon-green);
      box-shadow: 0 0 0 2px var(--ink), 0 0 0 4px var(--neon-green);
    }

    .tab-btn.active {
      color: var(--neon-yellow);
      border-color: var(--neon-yellow);
      text-shadow: 0 0 8px var(--neon-yellow);
      box-shadow: 0 0 0 2px var(--ink), 0 0 0 4px var(--neon-yellow), 0 0 15px rgba(255, 232, 0, 0.4);
    }

    /* Stats Panel */
    .stats-container {
      display: flex;
      flex-direction: column;
      gap: 30px;
      margin-top: 20px;
    }

    .stats-card {
      background: rgba(5, 0, 20, 0.65);
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 0 3px var(--ink), 0 0 0 5px var(--neon-pink), 0 0 16px rgba(0, 255, 255, 0.35);
      padding: 24px 20px;
    }

    .stats-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: var(--neon-yellow);
      text-shadow: 0 0 8px var(--neon-yellow);
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .stats-grid-winners {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .winner-box {
      flex: 1;
      min-width: 150px;
      max-width: 220px;
      border: 1px solid var(--neon-cyan);
      background: rgba(0, 0, 0, 0.4);
      padding: 16px 10px;
      text-align: center;
    }

    .winner-box .w-rank {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: var(--neon-pink);
      margin-bottom: 8px;
    }

    .winner-box .w-flag {
      font-size: 44px;
      margin-bottom: 8px;
    }

    .winner-box .w-team {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: var(--neon-cyan);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .winner-box .w-count {
      font-size: 18px;
      color: var(--neon-green);
      font-weight: bold;
    }

    .stats-scorers-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 600px;
      margin: 0 auto;
    }

    .scorer-row {
      display: grid;
      grid-template-columns: 30px 1fr auto;
      align-items: center;
      gap: 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--neon-cyan);
      padding: 10px 16px;
    }

    .scorer-rank {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: var(--neon-pink);
    }

    .scorer-info {
      display: flex;
      flex-direction: column;
    }

    .scorer-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--neon-cyan);
      text-transform: uppercase;
    }

    .scorer-bar-wrap {
      height: 8px;
      background: #000;
      border: 1px solid var(--neon-cyan);
      margin-top: 6px;
      width: 100%;
    }

    .scorer-bar {
      height: 100%;
      background: var(--neon-green);
      box-shadow: 0 0 8px var(--neon-green);
      width: 0;
      transition: width 1s ease-out;
    }

    .scorer-votes {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: var(--neon-yellow);
      text-align: right;
    }

    /* ========== Predictions Panel ========== */
    .player-select-wrap {
      display: flex;
      justify-content: center;
      margin: 26px auto 20px;
      width: 100%;
      max-width: 500px;
    }

    /* Custom Dropdown Styling */
    .custom-select-container {
      position: relative;
      width: 100%;
      user-select: none;
    }

    .custom-select-trigger {
      width: 100%;
      background: rgba(5, 0, 20, 0.85);
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 0 3px var(--ink), 0 0 0 5px var(--neon-pink), 0 0 16px rgba(0, 255, 255, .4);
      color: var(--neon-green);
      padding: 12px 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      line-height: 1.5;
      outline: none;
      text-align: center;
      cursor: pointer;
      box-sizing: border-box;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .custom-select-container.active .custom-select-trigger {
      box-shadow: 0 0 0 3px var(--ink), 0 0 0 5px var(--neon-green), 0 0 22px rgba(57, 255, 20, .55);
      border-color: var(--neon-green);
    }

    .custom-select-options {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: rgba(13, 2, 33, 0.98);
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 0 3px var(--ink), 0 0 0 5px var(--neon-pink), 0 12px 24px rgba(0, 0, 0, 0.8);
      z-index: 1000;
      max-height: 250px;
      overflow-y: auto;
      display: none;
      box-sizing: border-box;
    }

    .custom-select-options.show {
      display: block;
    }

    .custom-select-option {
      padding: 12px 16px;
      cursor: pointer;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--neon-green);
      border-bottom: 1px solid rgba(0, 255, 255, 0.1);
      transition: background 0.1s, color 0.1s;
    }

    .custom-select-option:last-child {
      border-bottom: none;
    }

    .custom-select-option:hover {
      background: rgba(0, 255, 255, 0.15);
      color: #fff;
    }

    .custom-select-option.selected {
      background: rgba(57, 255, 20, 0.2);
      color: #fff;
      text-shadow: 0 0 6px var(--neon-green);
    }

    /* Scrollbar for custom dropdown */
    .custom-select-options::-webkit-scrollbar {
      width: 8px;
    }
    .custom-select-options::-webkit-scrollbar-track {
      background: rgba(5, 0, 20, 0.85);
    }
    .custom-select-options::-webkit-scrollbar-thumb {
      background: var(--neon-pink);
      border-radius: 4px;
    }
    .custom-select-options::-webkit-scrollbar-thumb:hover {
      background: var(--neon-green);
    }

    .pred-summary {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .pred-summary-card {
      flex: 1;
      min-width: 250px;
      max-width: 450px;
      background: rgba(5, 0, 20, 0.7);
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 0 3px var(--ink), 0 0 0 5px var(--neon-pink), 0 0 14px rgba(0, 255, 255, .3);
      padding: 20px 24px;
      text-align: center;
    }

    .pred-summary-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--neon-yellow);
      text-shadow: 0 0 6px var(--neon-yellow);
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .pred-summary-val {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: #fff;
      text-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .pred-summary-sub {
      font-family: 'VT323', monospace;
      font-size: 18px;
      color: var(--neon-green);
      margin-top: 8px;
    }

    .groups-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-bottom: 40px;
    }

    @media (min-width: 768px) {
      .groups-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .groups-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .group-card {
      background: rgba(5, 0, 20, 0.6);
      border: 2px solid var(--neon-pink);
      box-shadow: 0 0 0 3px var(--ink), 0 0 0 5px var(--neon-cyan), 0 0 10px rgba(255, 16, 240, 0.2);
      padding: 12px 14px;
    }

    .group-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: var(--neon-yellow);
      text-shadow: 0 0 6px var(--neon-yellow);
      text-align: center;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--neon-pink);
      padding-bottom: 6px;
    }

    .pred-match {
      display: grid;
      grid-template-columns: 1fr 60px 1fr;
      align-items: center;
      gap: 6px;
      padding: 8px 4px;
      border-bottom: 1px dashed rgba(0, 255, 255, 0.15);
      font-size: 16px;
    }

    .pred-match:last-child {
      border-bottom: none;
    }

    .pred-match-team {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .pred-match-team.home {
      justify-content: flex-end;
    }

    .pred-match-team.away {
      justify-content: flex-start;
    }

    /* Flag styles removed */

    .group-standings-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--neon-pink);
      text-shadow: 0 0 4px var(--neon-pink);
      text-align: center;
      margin-top: 14px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .standing-correct {
      color: var(--neon-green) !important;
      text-shadow: 0 0 4px var(--neon-green);
    }

    .standing-wrong {
      color: rgba(255, 255, 255, 0.35) !important;
      text-shadow: none;
    }

    .ko-rounds-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-bottom: 40px;
    }

    @media (min-width: 768px) {
      .ko-rounds-container {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .ko-rounds-container {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    .ko-round-card {
      background: rgba(5, 0, 20, 0.7);
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 0 3px var(--ink), 0 0 0 5px var(--neon-pink);
      padding: 12px 10px;
    }

    .ko-round-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--neon-yellow);
      text-shadow: 0 0 5px var(--neon-yellow);
      text-align: center;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--neon-cyan);
      padding-bottom: 6px;
    }

    .ko-teams-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ko-team-right-spot {
      color: var(--neon-green) !important;
      text-shadow: 0 0 4px var(--neon-green) !important;
    }

    .ko-team-wrong-spot {
      color: var(--neon-pink) !important;
      text-shadow: 0 0 4px var(--neon-pink) !important;
    }

    .ko-team-normal {
      color: #fff !important;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="hud">
      <span class="hud-item" id="hud-left">WELCOME BACK</span>
      <span class="hud-item" id="hud-right">GHA-PAN UP NEXT</span>
    </div>
    <header>
      <h1>TOTOMONDIALE</h1>
      <div class="ticker"><span>RECENT RESULTS: PORTUGAL 1-1 DR CONGO / AUSTRIA 3-1 JORDAN / ARGENTINA 3-0 ALGERIA /
          IRAQ 1-4 NORWAY / FRANCE 3-1 SENEGAL</span></div>
      <div class="sub" id="sub"></div>
      <div class="stats" id="stats"></div>
    </header>
    <div class="tabs">
      <button id="tab-leaderboard" class="tab-btn active" onclick="switchTab('leaderboard')">LEADERBOARD</button>
      <button id="tab-stats" class="tab-btn" onclick="switchTab('stats')">STATISTICS</button>
      <button id="tab-predictions" class="tab-btn" onclick="switchTab('predictions')">PREDICTIONS</button>
    </div>
    <div id="view-leaderboard">
      <div class="podium" id="podium"></div>
      <input class="search" id="search" placeholder="🔍 SEARCH PLAYER" style="display:none" />
      <div class="board" id="board">
        <div class="state">LOADING...</div>
      </div>
    </div>
    <div id="view-stats" style="display: none;"></div>
    <div id="view-predictions" style="display: none;">
      <div class="player-select-wrap">
        <div class="custom-select-container" id="custom-player-select">
          <div class="custom-select-trigger" onclick="toggleCustomSelect(event)">-- SELECT A PLAYER --</div>
          <div class="custom-select-options" id="custom-player-options"></div>
        </div>
        <select id="player-select" style="display: none;" onchange="renderPlayerPredictions(this.value)">
          <option value="">LOADING PLAYERS...</option>
        </select>
      </div>
      <div id="predictions-content">
        <div class="state">SELECT A PLAYER TO VIEW PREDICTIONS</div>
      </div>
    </div>
    <footer id="foot"></footer>
  </div>

  <script>
    const SUPABASE_URL = "https://ecqieaselexhcqkwbtcy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_EjucVbOgT36P_4e7D0eBYg_GwxS0Mgf";
    const CATS = [
      ["correct_score", "Group Scores"], ["correct_outcome", "Group Outcomes"],
      ["group_positions", "Group Standings"], ["knockouts", "Knockout Phase"],
      ["final_standings", "Final Standings"], ["top_scorer", "Top Scorer"]
    ];
    const RANK_LABEL = ['1ST', '2ND', '3RD'];
    const headers = { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY };

    const COUNTRY_RECONCILIATION_MAP = {
      "CAPE VERDE": "Capo Verde",
      "CABO VERDE": "Capo Verde",
      "CAPO VERDE": "Capo Verde",
      
      "CONGO DR": "Congo DR",
      "DR CONGO": "Congo DR",
      "DEMOCRATIC REPUBLIC OF CONGO": "Congo DR",
      
      "BOSNIA": "Bosnia H.",
      "BOSNIA HERZEGOVINA": "Bosnia H.",
      "BOSNIA H.": "Bosnia H.",
      "BOSNIA-HERZEGOVINA": "Bosnia H.",
      
      "CURACAO": "Curaçao",
      "CURAÇAO": "Curaçao",
      
      "IVORY COAST": "Ivory Coast",
      "COTE D'IVOIRE": "Ivory Coast",
      "COTE DIVOIRE": "Ivory Coast",
      
      "SOUTH KOREA": "South Korea",
      "KOREA SOUTH": "South Korea",
      "KOREA REPUBLIC": "South Korea",
      
      "CZECH REPUBLIC": "Czechia",
      "CZECHIA": "Czechia",
      
      "UNITED STATES": "USA",
      "UNITED STATES OF AMERICA": "USA",
      "USA": "USA",
      
      "NEW ZEALAND": "New Zealand",
      "SOUTH AFRICA": "South Africa",
      "SAUDI ARABIA": "Saudi Arabia",
      "COSTA RICA": "Costa Rica"
    };

    function reconcileCountryName(name) {
      if (!name) return "";
      name = name.toString().trim().toUpperCase();
      if (COUNTRY_RECONCILIATION_MAP[name]) {
        return COUNTRY_RECONCILIATION_MAP[name];
      }
      // title case fallback
      return name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    }

    // Custom select logic
    function toggleCustomSelect(event) {
      if (event) event.stopPropagation();
      const optionsDiv = document.getElementById('custom-player-options');
      const customSelect = document.getElementById('custom-player-select');
      if (optionsDiv && customSelect) {
        const isOpen = optionsDiv.classList.contains('show');
        if (isOpen) {
          optionsDiv.classList.remove('show');
          customSelect.classList.remove('active');
        } else {
          optionsDiv.classList.add('show');
          customSelect.classList.add('active');
        }
      }
    }

    function selectCustomPlayer(key, triggerRender = true) {
      const select = document.getElementById('player-select');
      const customTrigger = document.querySelector('.custom-select-trigger');
      const optionsDiv = document.getElementById('custom-player-options');
      const customSelect = document.getElementById('custom-player-select');
      
      if (select) {
        select.value = key;
      }
      
      if (key && PREDICTIONS_DATA && PREDICTIONS_DATA[key]) {
        customTrigger.textContent = PREDICTIONS_DATA[key].name;
      } else {
        customTrigger.textContent = '-- SELECT A PLAYER --';
      }
      
      const options = document.querySelectorAll('.custom-select-option');
      options.forEach(opt => {
        if (opt.dataset.value === key) {
          opt.classList.add('selected');
        } else {
          opt.classList.remove('selected');
        }
      });
      
      if (optionsDiv) optionsDiv.classList.remove('show');
      if (customSelect) customSelect.classList.remove('active');
      
      if (triggerRender) {
        renderPlayerPredictions(key);
      }
    }

    document.addEventListener('click', function(e) {
      const customSelect = document.getElementById('custom-player-select');
      if (customSelect && !customSelect.contains(e.target)) {
        const optionsDiv = document.getElementById('custom-player-options');
        if (optionsDiv) {
          optionsDiv.classList.remove('show');
          customSelect.classList.remove('active');
        }
      }
    });

    let PREDICTIONS_DATA = null;
    let OFFICIAL_RESULTS = null;
    let LEADERBOARD_ROWS = null;

    async function load() {
      try {
        const [rowsR, metaR, predsR] = await Promise.all([
          fetch(`${SUPABASE_URL}/rest/v1/xl_leaderboard?select=*&order=rank.asc,name.asc`, { headers }),
          fetch(`${SUPABASE_URL}/rest/v1/xl_leaderboard_meta?id=eq.1&select=*`, { headers }),
          fetch(`data/predictions.json`).catch(e => {
            console.error("Failed to load predictions.json:", e);
            return null;
          })
        ]);
        if (!rowsR.ok) throw new Error("HTTP " + rowsR.status);
        LEADERBOARD_ROWS = await rowsR.json();
        const meta = (await metaR.json())[0] || {};
        
        if (meta.stats && meta.stats.results) {
          OFFICIAL_RESULTS = meta.stats.results;
        }
        
        if (predsR && predsR.ok) {
          PREDICTIONS_DATA = await predsR.json();
        }
        
        render(LEADERBOARD_ROWS, meta);
        initPredictionsView();
      } catch (e) {
        document.getElementById('board').innerHTML =
          `<div class="state">ERROR: ${e.message}</div>`;
      }
    }

    function switchTab(tab) {
      const btnLeaderboard = document.getElementById('tab-leaderboard');
      const btnStats = document.getElementById('tab-stats');
      const btnPredictions = document.getElementById('tab-predictions');
      const viewLeaderboard = document.getElementById('view-leaderboard');
      const viewStats = document.getElementById('view-stats');
      const viewPredictions = document.getElementById('view-predictions');

      btnLeaderboard.classList.remove('active');
      btnStats.classList.remove('active');
      btnPredictions.classList.remove('active');
      viewLeaderboard.style.display = 'none';
      viewStats.style.display = 'none';
      viewPredictions.style.display = 'none';

      if (tab === 'leaderboard') {
        btnLeaderboard.classList.add('active');
        viewLeaderboard.style.display = 'block';
      } else if (tab === 'stats') {
        btnStats.classList.add('active');
        viewStats.style.display = 'block';
        setTimeout(() => {
          document.querySelectorAll('.scorer-bar').forEach(b => b.style.width = b.dataset.w + '%');
        }, 50);
      } else if (tab === 'predictions') {
        btnPredictions.classList.add('active');
        viewPredictions.style.display = 'block';
        initPredictionsView();
      }
    }

    const SCORER_RECONCILIATION_MAP = {
      "KANE": "HARRY KANE",
      "HAALAND": "ERLING HAALAND",
      "VINI JR": "VINICIUS JR",
      "VINICIUS": "VINICIUS JR",
      "YAMAL": "LAMINE YAMAL",
      "C. RONALDO": "CRISTIANO RONALDO",
      "C RONALDO": "CRISTIANO RONALDO",
      "RONALDO": "CRISTIANO RONALDO",
      "LAUTARO EL FUTBOL MARTINEZ": "LAUTARO MARTINEZ",
      "DEMBELE": "OUSMANE DEMBELE",
      "MBAPPE": "KYLIAN MBAPPE",
      "MBAPPÉ": "KYLIAN MBAPPE",
      "MBAPPÈ": "KYLIAN MBAPPE",
      "OLISE": "MICHAEL OLISE"
    };

    function reconcileScorerName(name) {
      if (!name) return "";
      name = name.toString().trim().toUpperCase();
      if (SCORER_RECONCILIATION_MAP[name]) {
        return SCORER_RECONCILIATION_MAP[name];
      }
      name = name.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      name = name.replace(/^[A-Z]\.\s+/, "");
      if (SCORER_RECONCILIATION_MAP[name]) {
        return SCORER_RECONCILIATION_MAP[name];
      }
      return name;
    }

    function initPredictionsView() {
      const select = document.getElementById('player-select');
      const customOptions = document.getElementById('custom-player-options');
      const customTrigger = document.querySelector('.custom-select-trigger');
      if (!select || !PREDICTIONS_DATA || !customOptions) return;
      
      const currentVal = select.value;
      select.innerHTML = '<option value="">-- SELECT A PLAYER --</option>';
      customOptions.innerHTML = '';
      
      // Default placeholder option
      const defaultOpt = document.createElement('div');
      defaultOpt.className = 'custom-select-option';
      defaultOpt.textContent = '-- SELECT A PLAYER --';
      defaultOpt.onclick = () => selectCustomPlayer("");
      customOptions.appendChild(defaultOpt);

      const sortedKeys = Object.keys(PREDICTIONS_DATA).sort((a, b) => {
        const nameA = (PREDICTIONS_DATA[a].name || '').trim();
        const nameB = (PREDICTIONS_DATA[b].name || '').trim();
        const partsA = nameA.split(/\s+/);
        const partsB = nameB.split(/\s+/);
        const surnameA = partsA[partsA.length - 1].toUpperCase();
        const surnameB = partsB[partsB.length - 1].toUpperCase();
        if (surnameA !== surnameB) {
          return surnameA.localeCompare(surnameB);
        }
        return nameA.localeCompare(nameB);
      });

      sortedKeys.forEach(key => {
        // Native select options (hidden but kept synced)
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = PREDICTIONS_DATA[key].name;
        select.appendChild(opt);

        // Custom select options
        const divOpt = document.createElement('div');
        divOpt.className = 'custom-select-option';
        divOpt.dataset.value = key;
        divOpt.textContent = PREDICTIONS_DATA[key].name;
        divOpt.onclick = () => selectCustomPlayer(key);
        customOptions.appendChild(divOpt);
      });

      if (currentVal && PREDICTIONS_DATA[currentVal]) {
        select.value = currentVal;
        selectCustomPlayer(currentVal, false); // sync trigger UI
      } else {
        customTrigger.textContent = '-- SELECT A PLAYER --';
      }
    }

    function viewPlayerPredictions(key) {
      switchTab('predictions');
      selectCustomPlayer(key, true);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderPlayerPredictions(playerKey) {
      const content = document.getElementById('predictions-content');
      if (!content) return;
      if (!playerKey || !PREDICTIONS_DATA || !PREDICTIONS_DATA[playerKey]) {
        content.innerHTML = '<div class="state">SELECT A PLAYER TO VIEW PREDICTIONS</div>';
        return;
      }
      
      const pred = PREDICTIONS_DATA[playerKey];
      let html = '';
      
      // 1. Summary Card (Predicted Champion & Top Scorer)
      const displayWinner = reconcileCountryName(pred.winner);
      const isScorerCorrect = OFFICIAL_RESULTS && OFFICIAL_RESULTS.topscorer_player &&
        reconcileScorerName(pred.top_scorer) === reconcileScorerName(OFFICIAL_RESULTS.topscorer_player);
      const scorerStyle = isScorerCorrect ? 'color: var(--neon-green); text-shadow: 0 0 4px var(--neon-green);' : '';
      const displayScorer = reconcileScorerName(pred.top_scorer);
      
      html += `
        <div class="pred-summary">
          <div class="pred-summary-card">
            <div class="pred-summary-title">🏆 PREDICTED CHAMPION</div>
            <div class="pred-summary-val">${displayWinner || 'TBD'}</div>
          </div>
          <div class="pred-summary-card">
            <div class="pred-summary-title">⚽️ PREDICTED TOP SCORER</div>
            <div class="pred-summary-val" style="${scorerStyle}">${displayScorer || 'TBD'}</div>
            <div class="pred-summary-sub">${pred.top_scorer_goals ? pred.top_scorer_goals + ' GOALS' : ''}</div>
          </div>
        </div>
      `;
      
      // 2. Final Standings Predictions
      if (pred.standings && pred.standings.some(x => x)) {
        html += `
          <div class="section-label">🏅 PREDICTED STANDINGS</div>
          <div class="board" style="margin-bottom: 30px;">
        `;
        pred.standings.forEach((team, idx) => {
          const actualTeam = OFFICIAL_RESULTS && OFFICIAL_RESULTS.standings ? OFFICIAL_RESULTS.standings[idx] : "";
          let stateClass = "";
          let checkmark = "";
          if (actualTeam) {
            const actualRec = reconcileCountryName(actualTeam).toUpperCase();
            const predRec = reconcileCountryName(team).toUpperCase();
            if (actualRec === predRec) {
              stateClass = "standing-correct";
              checkmark = "✓";
            } else {
              stateClass = "standing-wrong";
              checkmark = "✗";
            }
          }
          const displayTeam = reconcileCountryName(team);
          const rankHtml = idx < 3
            ? `<span class="r${idx + 1}">${RANK_LABEL[idx]}</span>`
            : String(idx + 1).padStart(2, '0');
          html += `
            <div class="row" style="margin: 0 0 10px 0;">
              <div class="rmain" style="cursor: default; grid-template-columns: 48px 1fr auto; padding: 10px 16px;">
                <div class="rank">${rankHtml}</div>
                <div class="who">${displayTeam || 'TBD'}</div>
                <div class="pts ${stateClass}">${checkmark}</div>
              </div>
            </div>
          `;
        });
        html += `
          </div>
        `;
      }
      
      // 3. Group Stage Grid
      html += `
        <div class="section-label">📋 GROUP STAGE PREDICTIONS</div>
        <div class="groups-grid">
      `;
      
      Object.keys(pred.group_matches).forEach(g => {
        html += `
          <div class="group-card">
            <div class="group-title">GROUP ${g}</div>
        `;
        
        // Render 6 matches
        pred.group_matches[g].forEach((m, idx) => {
          let outcomeMatches = false;
          let homeMatches = false;
          let awayMatches = false;
          let actualScoreText = "";
          let hsVal = m.home_score;
          let asVal = m.away_score;
          
          if (OFFICIAL_RESULTS && OFFICIAL_RESULTS.group_matches && OFFICIAL_RESULTS.group_matches[g]) {
            const actual = OFFICIAL_RESULTS.group_matches[g][idx];
            if (actual && actual.home_score !== "") {
              const ah = parseInt(actual.home_score);
              const aa = parseInt(actual.away_score);
              const ph = parseInt(m.home_score);
              const pa = parseInt(m.away_score);
              
              homeMatches = (ph === ah);
              awayMatches = (pa === aa);
              
              const predOutcome = ph > pa ? "H" : (ph < pa ? "A" : "D");
              const actualOutcome = ah > aa ? "H" : (ah < aa ? "A" : "D");
              outcomeMatches = (predOutcome === actualOutcome);
              
              actualScoreText = `<div style="font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--neon-cyan); margin-top: 4px;">${ah}-${aa}</div>`;
            }
          }
          
          const scoreBoxBorderColor = outcomeMatches ? 'var(--neon-green)' : 'var(--neon-pink)';
          const homeColor = homeMatches ? 'var(--neon-green)' : '#fff';
          const awayColor = awayMatches ? 'var(--neon-green)' : '#fff';
          
          const displayHome = reconcileCountryName(m.home);
          const displayAway = reconcileCountryName(m.away);
          
          html += `
            <div class="pred-match" style="border-bottom: 1px dashed rgba(0, 255, 255, 0.15);">
              <div class="pred-match-team home">${displayHome}</div>
              <div style="display: flex; flex-direction: column; align-items: center;">
                <div style="border: 1px solid ${scoreBoxBorderColor}; padding: 3px 6px; background: #000; min-width: 44px; text-align: center; line-height: 1;">
                  <span style="color: ${homeColor}; font-family: 'Press Start 2P', monospace; font-size: 9px;">${hsVal}</span>
                  <span style="color: #fff; font-family: 'Press Start 2P', monospace; font-size: 9px;">-</span>
                  <span style="color: ${awayColor}; font-family: 'Press Start 2P', monospace; font-size: 9px;">${asVal}</span>
                </div>
                ${actualScoreText}
              </div>
              <div class="pred-match-team away">${displayAway}</div>
            </div>
          `;
        });
        
        // Render Group Standings Predictions
        if (pred.group_standings && pred.group_standings[g]) {
          html += `
            <div class="group-standings-title">PREDICTED STANDINGS</div>
            <div style="display: flex; flex-direction: column; gap: 4px; background: transparent; border: none; padding: 0;">
          `;
          pred.group_standings[g].forEach((team, idx) => {
            let stateClass = "";
            let checkmark = "";
            if (OFFICIAL_RESULTS && OFFICIAL_RESULTS.group_standings && OFFICIAL_RESULTS.group_standings[g]) {
              const actualTeam = OFFICIAL_RESULTS.group_standings[g][idx];
              if (actualTeam) {
                const actualRec = reconcileCountryName(actualTeam).toUpperCase();
                const predRec = reconcileCountryName(team).toUpperCase();
                if (actualRec === predRec) {
                  stateClass = "standing-correct";
                  checkmark = "✓";
                } else {
                  stateClass = "standing-wrong";
                  checkmark = "✗";
                }
              }
            }
            const displayTeam = reconcileCountryName(team);
            const rankHtml = String(idx + 1).padStart(2, '0');
            html += `
              <div class="row" style="margin: 0; box-shadow: none; border-color: rgba(0, 255, 255, 0.2);">
                <div class="rmain" style="cursor: default; padding: 6px 10px; grid-template-columns: 24px 1fr auto; font-size: 14px;">
                  <div class="rank" style="font-size: 10px; color: var(--neon-cyan);">${rankHtml}</div>
                  <div class="who" style="font-size: 9px; color: #fff; text-align: left; text-transform: uppercase;">${displayTeam || 'TBD'}</div>
                  <div class="pts ${stateClass}" style="font-size: 10px;">${checkmark}</div>
                </div>
              </div>
            `;
          });
          html += `
            </div>
          `;
        }
        
        html += `
          </div>
        `;
      });
      
      html += `
        </div>
      `;
      
      // 4. Knockout Bracket Matches coupled
      if (pred.knockouts) {
        html += `
          <div class="section-label">🌳 KNOCKOUT BRACKET PREDICTIONS</div>
          <div class="ko-rounds-container">
        `;
        
        const ROUND_LABELS = {
          "r32": "ROUND OF 32",
          "r16": "ROUND OF 16",
          "qf": "QUARTERFINALS",
          "sf": "SEMIFINALS",
          "final": "FINALISTS"
        };
        
        Object.keys(ROUND_LABELS).forEach(rName => {
          html += `
            <div class="ko-round-card">
              <div class="ko-round-title">${ROUND_LABELS[rName]}</div>
              <div class="ko-teams-list">
          `;
          
          const teamList = pred.knockouts[rName];
          const matchCount = Math.floor(teamList.length / 2);
          for (let mIdx = 0; mIdx < matchCount; mIdx++) {
            const team1 = teamList[mIdx * 2];
            const team2 = teamList[mIdx * 2 + 1];
            
            let team1Class = "ko-team-normal";
            let team2Class = "ko-team-normal";
            
            if (OFFICIAL_RESULTS && OFFICIAL_RESULTS.knockouts && OFFICIAL_RESULTS.knockouts[rName]) {
              const actualRoundTeams = OFFICIAL_RESULTS.knockouts[rName];
              if (actualRoundTeams.some(x => x)) {
                // Team 1
                const t1True = actualRoundTeams[mIdx * 2];
                if (t1True && reconcileCountryName(t1True).toUpperCase() === reconcileCountryName(team1).toUpperCase()) {
                  team1Class = "ko-team-right-spot";
                } else if (actualRoundTeams.some(t => t && reconcileCountryName(t).toUpperCase() === reconcileCountryName(team1).toUpperCase())) {
                  team1Class = "ko-team-wrong-spot";
                }
                // Team 2
                const t2True = actualRoundTeams[mIdx * 2 + 1];
                if (t2True && reconcileCountryName(t2True).toUpperCase() === reconcileCountryName(team2).toUpperCase()) {
                  team2Class = "ko-team-right-spot";
                } else if (actualRoundTeams.some(t => t && reconcileCountryName(t).toUpperCase() === reconcileCountryName(team2).toUpperCase())) {
                  team2Class = "ko-team-wrong-spot";
                }
              }
            }
            
            const displayT1 = team1 ? reconcileCountryName(team1) : 'TBD';
            const displayT2 = team2 ? reconcileCountryName(team2) : 'TBD';
            
            html += `
              <div class="row" style="margin: 0; box-shadow: none; border-color: rgba(0, 255, 255, 0.2);">
                <div class="rmain" style="cursor: default; display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; padding: 6px 8px; font-size: 14px;">
                  <div class="${team1Class}" style="text-align: right; font-size: 8px; font-family: 'Press Start 2P', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                    ${displayT1}
                  </div>
                  <div style="font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--neon-pink);">VS</div>
                  <div class="${team2Class}" style="text-align: left; font-size: 8px; font-family: 'Press Start 2P', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                    ${displayT2}
                  </div>
                </div>
              </div>
            `;
          }
          
          html += `
              </div>
            </div>
          `;
        });
        
        html += `
          </div>
        `;
      }
      
      content.innerHTML = html;
    }

    function renderStats(meta, totalParticipants) {
      const container = document.getElementById('view-stats');
      if (!meta.stats || !meta.stats.winners || !meta.stats.scorers) {
        container.innerHTML = `<div class="state">NO STATISTICS UPLOADED YET</div>`;
        return;
      }

      const winners = meta.stats.winners || [];
      const scorers = meta.stats.scorers || [];

      // Render Winners (all predicted, with bars relative to the top country, with flags)
      let winnersHtml = '';
      if (winners.length > 0) {
        const refCount = winners[0].count || 1;
        winnersHtml = `
          <div class="section-label">⭐️ WORLD CHAMPIONS ⭐️</div>
          <div class="board">
        `;

        winners.forEach((w, i) => {
          const pct = Math.round((w.count / refCount) * 100);
          const barColor = `hsl(${120 * (w.count / refCount)}, 100%, 50%)`;
          const rankHtml = i < 3
            ? `<span class="r${i + 1}">${RANK_LABEL[i]}</span>`
            : String(i + 1).padStart(2, '0');
          const displayTeam = reconcileCountryName(w.team);
          winnersHtml += `
            <div class="row">
              <div class="rmain" style="cursor: default;">
                <div class="ball">⚽</div>
                <div class="rank">${rankHtml}</div>
                <div>
                  <div class="who">${displayTeam}</div>
                  <div class="barwrap"><div class="bar" style="background:${barColor}" data-w="${pct}"></div></div>
                </div>
                <div class="pts">${w.count}</div>
                <div></div>
              </div>
            </div>
          `;
        });

        winnersHtml += `
          </div>
        `;
      }

      // Render Scorers (all predicted, vertical list, no bars, vote count written)
      let scorersHtml = '';
      if (scorers.length > 0) {
        scorersHtml = `
          <div class="section-label">⚽️ TOP SCORERS ⚽️</div>
          <div class="board">
        `;

        scorers.forEach((s, i) => {
          const rankHtml = i < 3
            ? `<span class="r${i + 1}">${RANK_LABEL[i]}</span>`
            : String(i + 1).padStart(2, '0');
          scorersHtml += `
            <div class="row">
              <div class="rmain" style="cursor: default;">
                <div class="ball">⚽</div>
                <div class="rank">${rankHtml}</div>
                <div>
                  <div class="who">${s.player}</div>
                </div>
                <div class="pts">${s.count}</div>
                <div></div>
              </div>
            </div>
          `;
        });

        scorersHtml += `
          </div>
        `;
      }

      container.innerHTML = winnersHtml + scorersHtml;
    }

    function render(rows, meta) {
      const maxBar = Math.max(1, meta.max_possible || 1);
      document.getElementById('foot').innerHTML =
        `© TOTOMONDIALE 2026 - ALL RIGHTS RESERVED<br>UPDATED ${meta.generated || '--:--'}`;

      // Auto-update ticker & HUD from Supabase fields set by fetch_results.py
      if (meta.ticker_text) {
        document.querySelector('.ticker span').textContent = meta.ticker_text;
      }
      if (meta.next_game_text) {
        const hudLeft = document.getElementById('hud-left');
        const hudRight = document.getElementById('hud-right');
        if (hudLeft && hudRight) {
          const parts = meta.next_game_text.split('|');
          if (parts.length === 2) {
            if (parts[0].includes('LIVE:') && parts[1].includes('LIVE:')) {
              const score1 = parts[0].replace('LIVE:', '').trim();
              const score2 = parts[1].replace('LIVE:', '').trim();
              hudLeft.textContent = score1;
              hudLeft.classList.add('blink');

              hudRight.textContent = score2;
              hudRight.classList.add('blink');
            } else {
              const scorePart = parts[1].replace('LIVE:', '').trim();
              hudLeft.textContent = scorePart;
              hudLeft.classList.add('blink');

              hudRight.textContent = parts[0];
              hudRight.classList.remove('blink');
            }
          } else {
            hudLeft.textContent = 'WELCOME BACK';
            hudLeft.classList.remove('blink');

            hudRight.textContent = parts[0];
            hudRight.classList.remove('blink');
          }
        }
      }

      const podEl = document.getElementById('podium');
      const medal = ['🥇', '🥈', '🥉'];
      podEl.innerHTML = '';
      rows.slice(0, 3).forEach((d, i) => {
        const el = document.createElement('div'); el.className = 'pod';
        el.innerHTML = `<div class="medal">${medal[i]}</div>
      <div class="pname">${d.name}</div><div class="ppts">${d.total}</div>
      <div class="pod-rank r${i + 1}">${RANK_LABEL[i]}</div>`;
        podEl.appendChild(el);
      });

      renderStats(meta, rows.length);

      const search = document.getElementById('search'); search.style.display = 'block';
      const board = document.getElementById('board');
      function build(list) {
        board.innerHTML = '';
        const maxScore = Math.max(...list.map(x => x.total || 0), 1);
        list.forEach((d, idx) => {
          const row = document.createElement('div'); row.className = 'row'; row.style.animationDelay = (idx * 0.02) + 's';
          const pctN = Math.round(100 * d.total / maxBar);
          const pctScore = d.total / maxScore;
          const cats = CATS.map(([k, label]) => {
            const v = d[k] || 0;
            return `<div class="cat ${v === 0 ? 'zero' : ''}"><div class="cl">${label}</div><div class="cv">${v}</div></div>`;
          }).join('');
          let barColor;
          const hue = pctN * 1.25
          barColor = `hsl(${hue}, 100%, 50%)`;
          const rankHtml = d.rank <= 3
            ? `<span class="r${d.rank}">${RANK_LABEL[d.rank - 1]}</span>`
            : String(d.rank).padStart(2, '0');
          row.innerHTML = `
        <div class="rmain">
          <div class="ball">⚽</div>
          <div class="rank">${rankHtml}</div>
          <div><div class="who">${d.name}</div>
            <div class="barwrap"><div class="bar" style="background:${barColor}" data-w="${pctN}"></div></div></div>
          <div class="pts">${d.total}</div>
          <div class="chev">▾</div>
        </div>
        <div class="detail"><div class="cats">${cats}</div>
          <div class="ctx">
            <div>${d.total}/${meta.max_possible || 0} PTS · ${Math.round(pctN)}%</div>
            <div class="ctx-winner" style="cursor: pointer;" onclick="viewPlayerPredictions('${d.key}')" onmouseover="this.style.color='var(--neon-green)'" onmouseout="this.style.color=''">VIEW PREDICTIONS</div>
          </div>
        </div>`;
          row.querySelector('.rmain').onclick = () => row.classList.toggle('open');
          board.appendChild(row);
        });
        requestAnimationFrame(() => document.querySelectorAll('.bar').forEach(b => b.style.width = b.dataset.w + '%'));
      }
      build(rows);
      search.oninput = e => {
        const q = e.target.value.toLowerCase();
        build(rows.filter(d => (d.name || '').toLowerCase().includes(q)));
      };
    }
    load();

    /* Auto-adjust font sizes if text wraps */
    function preventWrapping() {
      document.querySelectorAll('.pname').forEach(el => {
        if (el.scrollHeight > el.clientHeight) {
          el.style.fontSize = 'clamp(8px, 2vw, 10px)';
        }
      });
      document.querySelectorAll('.who').forEach(el => {
        if (el.scrollHeight > el.clientHeight) {
          el.style.fontSize = 'clamp(7px, 2vw, 8px)';
        }
      });
      document.querySelectorAll('.pts').forEach(el => {
        if (el.scrollHeight > el.clientHeight) {
          el.style.fontSize = 'clamp(10px, 2.5vw, 12px)';
        }
      });
    }

    setTimeout(preventWrapping, 500);
    window.addEventListener('resize', preventWrapping);
  </script>
</body>

</html>
