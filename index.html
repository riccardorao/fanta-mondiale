<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FIFA WC 2026 · Fantamondiale Leaderboard</title>
<meta name="description" content="Live Fantamondiale leaderboard — FIFA World Cup 2026"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
  :root{
    --neon-green:#39FF14; --neon-pink:#FF10F0; --neon-cyan:#00FFFF; --neon-yellow:#FFE800;
    --gold:#FFD700; --silver:#C0C0C0; --bronze:#CD7F32;
    --ink:#050014;
  }
  *{box-sizing:border-box;margin:0;padding:0;border-radius:0!important}
  body{
    font-family:'VT323',monospace;font-size:18px;
    background:radial-gradient(circle at 50% 0%, #1a0033 0%, #0a0020 55%, #000 100%);
    color:var(--neon-green);min-height:100vh;padding:18px 14px 60px;
    position:relative;overflow-x:hidden;
  }
  body::after{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
    background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.55) 100%);
    animation:flicker 6s infinite;
  }
  @keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.82}94%{opacity:1}97%{opacity:1}98%{opacity:.88}}
  .wrap{max-width:1080px;margin:0 auto;position:relative}

  /* HUD bar */
  .hud{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;
    font-family:'Press Start 2P',monospace;font-size:10px;margin-bottom:22px;
    border:2px solid var(--neon-cyan);box-shadow:0 0 0 3px var(--ink),0 0 0 5px var(--neon-pink),0 0 16px rgba(0,255,255,.4);
    padding:10px 16px;background:rgba(5,0,20,0.6)}
  .hud-item{color:var(--neon-yellow);text-shadow:0 0 6px var(--neon-yellow)}
  .hud-item.blink{animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:.25}}

  header{text-align:center;margin-bottom:8px}
  h1{font-family:'Press Start 2P',monospace;font-size:clamp(26px,7vw,50px);line-height:1.2;
    color:var(--neon-yellow);letter-spacing:3px;font-weight:900;
    text-shadow:3px 3px 0 var(--neon-pink),6px 6px 0 var(--neon-cyan),0 0 24px rgba(255,232,0,.5);
    animation:glitchIn .6s ease-out}
  @keyframes glitchIn{
    0%{opacity:0;transform:translate(-12px,0) skewX(8deg);filter:hue-rotate(120deg)}
    25%{opacity:1;transform:translate(8px,0) skewX(-6deg)}
    50%{transform:translate(-4px,0) skewX(3deg);filter:hue-rotate(40deg)}
    75%{transform:translate(2px,0) skewX(-1deg);filter:hue-rotate(0deg)}
    100%{transform:translate(0,0) skewX(0);opacity:1}
  }
  .ticker{margin:14px 0 0;width:100%;overflow:hidden;white-space:nowrap;
    border-top:2px solid var(--neon-pink);border-bottom:2px solid var(--neon-pink);padding:6px 0}
  .ticker span{display:inline-block;padding-left:100%;font-size:15px;color:var(--neon-cyan);
    text-shadow:0 0 6px var(--neon-cyan);animation:marquee 16s linear infinite}
  @keyframes marquee{to{transform:translateX(-100%)}}
  .sub{display:none}
  .stats{display:none}

  .section-label{text-align:center;font-family:'Press Start 2P',monospace;font-size:13px;
    color:var(--neon-pink);text-shadow:0 0 8px var(--neon-pink);margin:30px 0 16px;letter-spacing:2px}

  .podium{display:flex;gap:18px;justify-content:center;align-items:flex-end;margin:0 0 30px;flex-wrap:wrap}
  .pod{flex:1;min-width:170px;max-width:220px;padding:20px 14px;text-align:center;
    border:2px solid var(--neon-cyan);box-shadow:0 0 0 3px var(--ink),0 0 0 5px var(--neon-pink),0 0 18px rgba(0,255,255,.45);
    background:rgba(5,0,20,0.65);
    transform:translateY(20px);opacity:0;animation:rise .6s forwards}
  .pod .medal{font-size:38px;margin-bottom:6px}
  .pod .pname{font-family:'Press Start 2P',monospace;font-size:clamp(10px,2.5vw,13px);color:var(--neon-cyan);text-transform:uppercase;letter-spacing:1px;margin:6px 0}
  .pod .ppts{font-family:'Press Start 2P',monospace;font-size:26px;letter-spacing:1px;font-weight:900;margin:8px 0;color:var(--neon-green)}
  .pod .plabel{display:none}
  .pod-rank{font-family:'Press Start 2P',monospace;font-size:13px;margin-top:4px;letter-spacing:1px}
  @keyframes rise{to{transform:translateY(0);opacity:1}}
  @keyframes flash{0%,100%{opacity:1;filter:brightness(1)}50%{opacity:.5;filter:brightness(1.8)}}
  .r1{color:var(--gold);text-shadow:0 0 10px var(--gold);animation:flash 0.8s infinite}
  .r2{color:var(--silver);text-shadow:0 0 10px var(--silver);animation:flash 1.0s infinite}
  .r3{color:var(--bronze);text-shadow:0 0 10px var(--bronze);animation:flash 1.2s infinite}

  .board{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .row{background:rgba(5,0,20,0.6);overflow:hidden;
    border:2px solid var(--neon-cyan);box-shadow:0 0 0 3px var(--ink),0 0 0 5px var(--neon-pink),0 0 14px rgba(0,255,255,.3);
    opacity:0;transform:translateY(8px);animation:fade .5s forwards;transition:box-shadow .2s,background .2s}
  .row:hover{background:rgba(20,0,40,0.85);box-shadow:0 0 0 3px var(--ink),0 0 0 5px var(--neon-green),0 0 22px rgba(57,255,20,.55)}
  @keyframes fade{to{opacity:1;transform:none}}
  .rmain{display:grid;grid-template-columns:40px 1fr auto 28px;align-items:center;gap:10px;
    padding:13px 16px;cursor:pointer;transition:transform .1s;white-space:nowrap;position:relative}
  .rmain:active{transform:translateY(2px)}
  .ball{font-size:14px;text-align:center;opacity:0;transition:opacity .2s;display:none}
  .row:hover .ball{opacity:1;animation:bob .5s ease-in-out infinite alternate}
  @keyframes bob{from{transform:translateY(0) rotate(0deg)}to{transform:translateY(-3px) rotate(20deg)}}
  .who{font-family:'Press Start 2P',monospace;font-size:clamp(8px,2.5vw,10px);color:var(--neon-cyan);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
  .barwrap{height:12px;background:#000;border:1px solid var(--neon-cyan);margin-top:7px;overflow:hidden;width:clamp(80px,40vw,500px)}
  .bar{height:100%;width:0;transition:width 1.2s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 10px currentColor}
  .pts{font-family:'Press Start 2P',monospace;font-size:clamp(12px,3vw,14px);font-weight:900;text-align:right;color:var(--neon-yellow)}
  .chev{color:var(--neon-pink);transition:transform .25s;text-align:center;font-weight:900;font-size:12px;text-shadow:0 0 6px var(--neon-pink)}
  .row.open .chev{transform:rotate(180deg)}
  .detail{max-height:0;overflow:hidden;transition:max-height .35s ease}
  .row.open .detail{max-height:420px;border-top:2px solid var(--neon-cyan)}
  .cats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:16px;background:rgba(0,0,0,0.4)}
  @media (min-width:700px){.cats{grid-template-columns:repeat(6,1fr)}}
  .cat{background:rgba(5,0,20,0.7);border:1px solid var(--neon-cyan);box-shadow:0 0 0 2px var(--ink),0 0 0 3px var(--neon-pink);padding:10px;text-align:center}
  .cat .cl{font-size:18px;color:#fff;font-weight:400;text-transform:uppercase;line-height:1.2}
  .cat .cv{font-size:26px;margin-top:6px;color:var(--neon-green);font-weight:700;text-shadow:none}
  .cat.zero{opacity:.35}
  .ctx{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;font-size:14px;color:var(--neon-cyan);background:rgba(0,0,0,0.4)}
  .ctx-winner{font-family:'Press Start 2P',monospace;font-size:11px;text-align:right}
  .row-winner{position:absolute;bottom:8px;right:12px;font-family:'Press Start 2P',monospace;font-size:10px;color:var(--neon-pink);text-shadow:0 0 6px var(--neon-pink);text-align:right;min-height:18px}

  .search{display:block;margin:26px auto 4px;width:100%;background:rgba(5,0,20,0.7);
    border:2px solid var(--neon-cyan);box-shadow:0 0 0 3px var(--ink),0 0 0 5px var(--neon-pink),0 0 16px rgba(0,255,255,.4);
    color:var(--neon-green);padding:12px 16px;font-family:'VT323',monospace;font-size:18px;outline:none}
  .search:focus{box-shadow:0 0 0 3px var(--ink),0 0 0 5px var(--neon-green),0 0 22px rgba(57,255,20,.55)}
  .search::placeholder{color:rgba(57,255,20,.5)}
  footer{text-align:center;color:var(--neon-cyan);font-size:18px;margin-top:36px;line-height:1.6;text-shadow:0 0 6px var(--neon-cyan)}
  .state{text-align:center;color:var(--neon-green);padding:40px 20px;font-size:18px;animation:blink 1s steps(2) infinite}
  @media (min-width:700px){
    .podium{flex-wrap:nowrap}
    .pod{min-width:auto;max-width:none}
    .rmain{grid-template-columns:22px 36px 1fr 80px 32px}
    .ball{display:block}
    .who{white-space:normal}
    .barwrap{width:clamp(250px,50vw,600px)}
  }
  @media (max-width:699px){
    .podium{flex-direction:column;align-items:stretch;gap:14px}
    .pod{max-width:100%}
    .rmain{grid-template-columns:26px 165px 1fr auto;gap:6px;padding:10px 8px}
    .who{max-width:250px}
    .barwrap{width:250px;height:9px;margin-top:4px}
    .pts{min-width:32px}
    .chev{margin-left:-1px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="hud">
    <span class="hud-item">WELCOME BACK</span>
    <span class="hud-item blink">NEXT GAME POR-COD</span>
  </div>
  <header>
    <h1>LEADERBOARD</h1>
    <div class="ticker"><span>RECENT RESULTS // AUSTRIA 3-1 JORDAN // ARGENTINA 3-0 ALGERIA // IRAQ 1-4 NORWAY // FRANCE 3-1 SENEGAL // IRAN 2-2 NEW ZEALAND // SAUDI ARABIA 1-1 URUGUAY</span></div>
    <div class="sub" id="sub"></div>
    <div class="stats" id="stats"></div>
  </header>
  <div class="section-label">HIGHEST SCORES</div>
  <div class="podium" id="podium"></div>
  <input class="search" id="search" placeholder="🔍 SEARCH PLAYER" style="display:none"/>
  <div class="board" id="board"><div class="state">LOADING...</div></div>
  <footer id="foot"></footer>
</div>

<script>
const SUPABASE_URL = "https://ecqieaselexhcqkwbtcy.supabase.co";
const SUPABASE_KEY = "sb_publishable_EjucVbOgT36P_4e7D0eBYg_GwxS0Mgf";
const CATS = [
  ["correct_score","Group Scores"],["correct_outcome","Group Outcomes"],
  ["group_positions","Group Standings"],["knockouts","Knockout Phase"],
  ["final_standings","Final Standings"],["top_scorer","Top Scorer"]
];
const RANK_LABEL = ['1ST','2ND','3RD'];
const headers = { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY };

const COUNTRY_FLAGS = {
  'Algeria': '🇩🇿',
  'Argentina': '🇦🇷',
  'Australia': '🇦🇺',
  'Austria': '🇦🇹',
  'Belgium': '🇧🇪',
  'Bosnia H.': '🇧🇦',
  'Brazil': '🇧🇷',
  'Canada': '🇨🇦',
  'Capo Verde': '🇨🇻',
  'Colombia': '🇨🇴',
  'Congo DR': '🇨🇩',
  'Costa Rica': '🇨🇷',
  'Croatia': '🇭🇷',
  'Curaçao': '🇨🇼',
  'Czechia': '🇨🇿',
  'Ecuador': '🇪🇨',
  'Egypt': '🇪🇬',
  'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿',
  'France': '🇫🇷',
  'Germany': '🇩🇪',
  'Ghana': '🇬🇭',
  'Haiti': '🇭🇹',
  'Iran': '🇮🇷',
  'Iraq': '🇮🇶',
  'Ivory Coast': '🇨🇮',
  'Japan': '🇯🇵',
  'Jordan': '🇯🇴',
  'Mexico': '🇲🇽',
  'Morocco': '🇲🇦',
  'Netherlands': '🇳🇱',
  'New Zealand': '🇳🇿',
  'Norway': '🇳🇴',
  'Panama': '🇵🇦',
  'Paraguay': '🇵🇾',
  'Portugal': '🇵🇹',
  'Qatar': '🇶🇦',
  'Saudi Arabia': '🇸🇦',
  'Scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿',
  'Senegal': '🇸🇳',
  'South Africa': '🇿🇦',
  'South Korea': '🇰🇷',
  'Spain': '🇪🇸',
  'Sweden': '🇸🇪',
  'Switzerland': '🇨🇭',
  'Tunisia': '🇹🇳',
  'Turkey': '🇹🇷',
  'Uruguay': '🇺🇾',
  'USA': '🇺🇸',
  'Uzbekistan': '🇺🇿'
};

function getFlagEmoji(country) {
  return COUNTRY_FLAGS[country] || '🌍';
}

function getWinner(data) {
  return data.predicted_winner || null;
}

async function load(){
  try{
    const [rowsR, metaR] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/xl_leaderboard?select=*&order=rank.asc,name.asc`, {headers}),
      fetch(`${SUPABASE_URL}/rest/v1/xl_leaderboard_meta?id=eq.1&select=*`, {headers})
    ]);
    if(!rowsR.ok) throw new Error("HTTP "+rowsR.status);
    const rows = await rowsR.json();
    const meta = (await metaR.json())[0] || {};
    render(rows, meta);
  }catch(e){
    document.getElementById('board').innerHTML =
      `<div class="state">ERROR: ${e.message}</div>`;
  }
}

function render(rows, meta){
  const maxBar = Math.max(1, meta.max_possible || 1);
  document.getElementById('foot').innerHTML =
    `© FANTAMONDIALE 2026 - ALL RIGHTS RESERVED // UPDATED ${meta.generated||'--:--'}`;

  const podEl = document.getElementById('podium');
  const medal=['🥇','🥈','🥉'];
  podEl.innerHTML='';
  rows.slice(0,3).forEach((d,i)=>{
    const el=document.createElement('div'); el.className='pod';
    el.innerHTML=`<div class="medal">${medal[i]}</div>
      <div class="pname">${d.name}</div><div class="ppts">${d.total}</div>
      <div class="pod-rank r${i+1}">${RANK_LABEL[i]}</div>`;
    podEl.appendChild(el);
  });

  const search=document.getElementById('search'); search.style.display='block';
  const board=document.getElementById('board');
  function build(list){
    board.innerHTML='';
    const maxScore = Math.max(...list.map(x => x.total || 0), 1);
    list.forEach((d,idx)=>{
      const row=document.createElement('div'); row.className='row'; row.style.animationDelay=(idx*0.02)+'s';
      const pctN = Math.round(100*d.total/maxBar);
      const pctScore = d.total / maxScore;
      const cats=CATS.map(([k,label])=>{
        const v=d[k]||0;
        return `<div class="cat ${v===0?'zero':''}"><div class="cl">${label}</div><div class="cv">${v}</div></div>`;
      }).join('');
      let barColor;
      const hue = pctN * 1.25
      barColor = `hsl(${hue}, 100%, 50%)`;
      const rankHtml = d.rank<=3
        ? `<span class="r${d.rank}">${RANK_LABEL[d.rank-1]}</span>`
        : String(d.rank).padStart(2, '0');
      row.innerHTML=`
        <div class="rmain">
          <div class="ball">⚽</div>
          <div class="rank">${rankHtml}</div>
          <div><div class="who">${d.name}</div>
            <div class="barwrap"><div class="bar" style="background:${barColor}" data-w="${pctN}"></div></div></div>
          <div class="pts">${d.total}</div>
          <div class="chev">▾</div>
          <div class="row-winner">${getWinner(d) ? getFlagEmoji(getWinner(d)) + ' ' + getWinner(d) : ''}</div>
        </div>
        <div class="detail"><div class="cats">${cats}</div>
          <div class="ctx">
            <div>${d.total}/${meta.max_possible||0} PTS · ${Math.round(pctN)}%</div>
            <div class="ctx-winner">${getWinner(d) ? getFlagEmoji(getWinner(d)) + ' ' + getWinner(d) : ''}</div>
          </div>
        </div>`;
      row.querySelector('.rmain').onclick=()=>row.classList.toggle('open');
      board.appendChild(row);
    });
    requestAnimationFrame(()=>document.querySelectorAll('.bar').forEach(b=>b.style.width=b.dataset.w+'%'));
  }
  build(rows);
  search.oninput=e=>{
    const q=e.target.value.toLowerCase();
    build(rows.filter(d=>(d.name||'').toLowerCase().includes(q)));
  };
}
load();

/* Auto-adjust font sizes if text wraps */
function preventWrapping() {
  document.querySelectorAll('.pname').forEach(el => {
    if(el.scrollHeight > el.clientHeight) {
      el.style.fontSize = 'clamp(8px, 2vw, 10px)';
    }
  });
  document.querySelectorAll('.who').forEach(el => {
    if(el.scrollHeight > el.clientHeight) {
      el.style.fontSize = 'clamp(7px, 2vw, 8px)';
    }
  });
  document.querySelectorAll('.pts').forEach(el => {
    if(el.scrollHeight > el.clientHeight) {
      el.style.fontSize = 'clamp(10px, 2.5vw, 12px)';
    }
  });
}

setTimeout(preventWrapping, 500);
window.addEventListener('resize', preventWrapping);
</script>
</body>
</html>
