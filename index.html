<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FIFA WC 2026 · Fantamondiale Leaderboard</title>
<meta name="description" content="Live Fantamondiale leaderboard — FIFA World Cup 2026"/>
<style>
  :root{
    --bg:#0a0e1a; --bg2:#11172b; --card:#161d33; --card2:#1c2540;
    --gold:#ffd24a; --silver:#cdd6e4; --bronze:#e0935a;
    --txt:#eaf0ff; --dim:#8896b5; --line:#26304d;
    --accent:#4f8cff; --accent2:#7c5cff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:radial-gradient(1200px 700px at 50% -10%,#16204d 0,transparent 60%),
               radial-gradient(900px 600px at 90% 10%,#2a1d5e33 0,transparent 55%),var(--bg);
    color:var(--txt);min-height:100vh;padding:32px 16px 80px;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto}
  header{text-align:center;margin-bottom:30px}
  .kicker{letter-spacing:.42em;font-size:11px;color:var(--accent);text-transform:uppercase;font-weight:700;margin-bottom:10px}
  h1{font-size:clamp(30px,6vw,52px);font-weight:900;line-height:1.02;
    background:linear-gradient(120deg,#fff 10%,var(--gold) 55%,#ffb84a 90%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 6px 24px #ffd24a22)}
  .sub{color:var(--dim);margin-top:12px;font-size:14px}
  .stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
  .pill{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:8px 16px;font-size:12.5px;color:var(--dim)}
  .pill b{color:var(--txt)}
  .podium{display:flex;gap:14px;justify-content:center;align-items:flex-end;margin:34px 0 26px;flex-wrap:wrap}
  .pod{flex:1;min-width:150px;max-width:230px;border-radius:18px;padding:20px 16px;text-align:center;
    border:1px solid var(--line);background:linear-gradient(180deg,var(--card2),var(--card));
    transform:translateY(24px);opacity:0;animation:rise .7s forwards}
  .pod .medal{font-size:30px;margin-bottom:4px}
  .pod .pname{font-weight:800;font-size:18px;margin:4px 0}
  .pod .ppts{font-size:30px;font-weight:900;letter-spacing:-1px}
  .pod .plabel{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em}
  .pod.gold{border-color:#ffd24a55;box-shadow:0 24px 60px -22px #ffd24a66;padding-top:30px;order:2}
  .pod.silver{order:1} .pod.bronze{order:3}
  .pod.gold .ppts{color:var(--gold)} .pod.silver .ppts{color:var(--silver)} .pod.bronze .ppts{color:var(--bronze)}
  @keyframes rise{to{transform:translateY(0);opacity:1}}
  .board{display:flex;flex-direction:column;gap:9px;margin-top:8px}
  .row{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    opacity:0;transform:translateY(10px);animation:fade .5s forwards}
  @keyframes fade{to{opacity:1;transform:none}}
  .rmain{display:grid;grid-template-columns:54px 1fr auto 40px;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background .2s}
  .rmain:hover{background:var(--card2)}
  .rank{font-weight:900;font-size:20px;color:var(--dim);text-align:center}
  .top1 .rank{color:var(--gold)} .top2 .rank{color:var(--silver)} .top3 .rank{color:var(--bronze)}
  .who{font-weight:700;font-size:16px}
  .barwrap{height:7px;background:#0e1426;border-radius:6px;margin-top:7px;overflow:hidden;width:min(420px,46vw)}
  .bar{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
  .top1 .bar{background:linear-gradient(90deg,var(--gold),#ffb347)}
  .pts{font-weight:900;font-size:22px;text-align:right}
  .chev{color:var(--dim);transition:transform .25s;text-align:center}
  .row.open .chev{transform:rotate(180deg)}
  .detail{max-height:0;overflow:hidden;transition:max-height .35s ease;border-top:1px solid transparent}
  .row.open .detail{max-height:340px;border-top-color:var(--line)}
  .cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:16px}
  .cat{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px}
  .cat .cl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
  .cat .cv{font-size:20px;font-weight:800;margin-top:3px}
  .cat.zero{opacity:.4}
  .ctx{padding:0 16px 16px;font-size:12px;color:var(--dim)}
  .search{display:block;margin:24px auto 4px;width:min(360px,90%);background:var(--card);border:1px solid var(--line);
    color:var(--txt);border-radius:999px;padding:11px 18px;font-size:14px;outline:none}
  .search:focus{border-color:var(--accent)}
  footer{text-align:center;color:var(--dim);font-size:12px;margin-top:40px;line-height:1.7}
  .state{text-align:center;color:var(--dim);padding:60px 20px;font-size:15px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Fantamondiale · World Cup 2026</div>
    <h1>The Leaderboard</h1>
    <div class="sub" id="sub">Loading live scores…</div>
    <div class="stats" id="stats"></div>
  </header>
  <div class="podium" id="podium"></div>
  <input class="search" id="search" placeholder="Search a participant…" style="display:none"/>
  <div class="board" id="board"><div class="state">Connecting to live data…</div></div>
  <footer id="foot"></footer>
</div>

<script>
const SUPABASE_URL = "https://ecqieaselexhcqkwbtcy.supabase.co";
const SUPABASE_KEY = "sb_publishable_EjucVbOgT36P_4e7D0eBYg_GwxS0Mgf";
const CATS = [
  ["correct_score","Correct Score"],["correct_outcome","Correct Outcome"],
  ["group_positions","Group Positions"],["knockouts","Knockouts"],
  ["final_standings","Final Standings"],["top_scorer","Top Scorer"]
];
const headers = { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY };

async function load(){
  try{
    const [rowsR, metaR] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/xl_leaderboard?select=*&order=rank.asc,name.asc`, {headers}),
      fetch(`${SUPABASE_URL}/rest/v1/xl_leaderboard_meta?id=eq.1&select=*`, {headers})
    ]);
    if(!rowsR.ok) throw new Error("HTTP "+rowsR.status);
    const rows = await rowsR.json();
    const meta = (await metaR.json())[0] || {};
    render(rows, meta);
  }catch(e){
    document.getElementById('board').innerHTML =
      `<div class="state">Couldn't load live data (${e.message}).<br>Please refresh in a moment.</div>`;
    document.getElementById('sub').textContent = "";
  }
}

function render(rows, meta){
  const maxBar = Math.max(1, meta.max_possible || 1);
  const tmax = meta.tournament_max || 0;
  document.getElementById('sub').textContent =
    `${meta.participants||rows.length} participants · ${meta.matches_played||0} group matches scored · ${meta.groups_complete||0} groups finalised`;
  document.getElementById('stats').innerHTML =
    `<span class="pill">Updated <b>${meta.generated||'—'}</b></span>`
    + `<span class="pill">Leader <b>${rows[0]?rows[0].total:0}</b> / ${meta.max_possible||0} so far</span>`
    + `<span class="pill">Tournament max <b>${tmax}</b> pts</span>`;
  document.getElementById('foot').innerHTML =
    `Live from Supabase · group scoring active · knockouts & standings activate as results are entered`;

  const podEl = document.getElementById('podium');
  const medal=['🥇','🥈','🥉'], cls=['gold','silver','bronze'];
  podEl.innerHTML='';
  rows.slice(0,3).forEach((d,i)=>{
    const el=document.createElement('div'); el.className='pod '+cls[i];
    el.innerHTML=`<div class="medal">${medal[i]}</div><div class="plabel">#${d.rank}</div>
      <div class="pname">${d.name}</div><div class="ppts">${d.total}</div><div class="plabel">points</div>`;
    podEl.appendChild(el);
  });

  const search=document.getElementById('search'); search.style.display='block';
  const board=document.getElementById('board');
  function build(list){
    board.innerHTML='';
    list.forEach((d,idx)=>{
      const top = d.rank<=3 ? ('top'+d.rank):'';
      const row=document.createElement('div'); row.className='row '+top; row.style.animationDelay=(idx*0.03)+'s';
      const cats=CATS.map(([k,label])=>{
        const v=d[k]||0;
        return `<div class="cat ${v===0?'zero':''}"><div class="cl">${label}</div><div class="cv">${v}</div></div>`;
      }).join('');
      const pctT = tmax? (100*d.total/tmax).toFixed(1):'0';
      const pctN = Math.round(100*d.total/maxBar);
      row.innerHTML=`
        <div class="rmain">
          <div class="rank">${d.rank}</div>
          <div><div class="who">${d.name}</div>
            <div class="barwrap"><div class="bar" data-w="${pctN}"></div></div></div>
          <div class="pts">${d.total}</div>
          <div class="chev">▾</div>
        </div>
        <div class="detail"><div class="cats">${cats}</div>
          <div class="ctx">${d.total} of ${tmax} tournament points (${pctT}%) · ${d.total} of ${meta.max_possible||0} available so far (${pctN}%)</div>
        </div>`;
      row.querySelector('.rmain').onclick=()=>row.classList.toggle('open');
      board.appendChild(row);
    });
    requestAnimationFrame(()=>document.querySelectorAll('.bar').forEach(b=>b.style.width=b.dataset.w+'%'));
  }
  build(rows);
  search.oninput=e=>{
    const q=e.target.value.toLowerCase();
    build(rows.filter(d=>(d.name||'').toLowerCase().includes(q)));
  };
}
load();
</script>
</body>
</html>
